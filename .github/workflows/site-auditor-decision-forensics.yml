name: SITE_AUDITOR - Decision Build Forensics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  decision-build-forensics:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run DECISION_BUILD forensics harness
        id: run_forensics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $snapshotPath = 'agents/gh_batch/site_auditor_cloud/tools/decision_build_snapshot.diagnostic_cloudlineage.json'
          $scriptPath = 'agents/gh_batch/site_auditor_cloud/tools/decision_build_forensics.ps1'
          $artifactDir = Join-Path $env:RUNNER_TEMP 'decision-build-forensics'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          $stamp = Get-Date -Format 'yyyyMMdd_HHmmss'
          $diagnosticPath = Join-Path $artifactDir ("decision_build_forensics_$stamp.json")

          Write-Host "[forensics-runner] Snapshot path used: $snapshotPath"
          Write-Host "[forensics-runner] Diagnostic artifact path: $diagnosticPath"

          & $scriptPath -SnapshotPath $snapshotPath -DiagnosticPath $diagnosticPath
          $exitCode = $LASTEXITCODE

          Write-Host "[forensics-runner] Exit status: $exitCode"
          "diagnostic_path=$diagnosticPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Upload DECISION_BUILD forensic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-build-forensics-output
          path: ${{ runner.temp }}/decision-build-forensics/decision_build_forensics_*.json
          if-no-files-found: error
