name: Site Auditor V3

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL or site to audit"
        required: true
        default: "https://example.com"
      run_mode:
        description: "Operator run mode"
        required: true
        default: "START"
        type: choice
        options:
          - START
          - NEXT
          - FULL

permissions:
  contents: read
  actions: read

jobs:
  run-v3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip powershell python3

      - name: Guard START against existing open session
        id: guard_start
        if: ${{ github.event.inputs.run_mode == 'START' }}
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 agents/site_auditor_v3/tools/workflow_session_state.py guard-start \
            --target-url "$TARGET_URL" \
            --repo "${{ github.repository }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Restore prior session for NEXT
        id: restore_next
        if: ${{ github.event.inputs.run_mode == 'NEXT' }}
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 agents/site_auditor_v3/tools/workflow_session_state.py restore-next \
            --target-url "$TARGET_URL" \
            --repo "${{ github.repository }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve FULL entry mode
        id: resolve_full
        if: ${{ github.event.inputs.run_mode == 'FULL' }}
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 agents/site_auditor_v3/tools/workflow_session_state.py resolve-full \
            --target-url "$TARGET_URL" \
            --repo "${{ github.repository }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Prepare START/NEXT request
        if: ${{ github.event.inputs.run_mode != 'FULL' }}
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          RUN_MODE: ${{ github.event.inputs.run_mode }}
          RESTORED_SESSION_ID: ${{ steps.restore_next.outputs.session_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          src = Path("agents/site_auditor_v3/tests/fixtures/link.request.json")
          dst = Path("/tmp/v3.request.json")

          target_url = (os.environ.get("TARGET_URL") or "").strip()
          run_mode = (os.environ.get("RUN_MODE") or "START").strip().upper()
          restored_session_id = (os.environ.get("RESTORED_SESSION_ID") or "").strip()

          if not target_url:
              raise SystemExit("target_url is required")
          if run_mode not in {"START", "NEXT"}:
              raise SystemExit(f"Invalid START/NEXT run mode: {run_mode!r}")

          data = json.loads(src.read_text())
          data["target_url"] = target_url
          data["scan_profile"] = "STANDARD"
          data["batch_size"] = 250
          data["auto_audit"] = False
          data["run_mode"] = run_mode

          if run_mode == "START":
              data["audit_action"] = "START"
              data["session_id"] = None
          else:
              if not restored_session_id:
                  raise SystemExit("NEXT restore did not provide a session_id")
              data["audit_action"] = "NEXT"
              data["session_id"] = restored_session_id

          dst.write_text(json.dumps(data, indent=2) + "\n")
          print(dst.read_text())
          PY

      - name: Run START/NEXT Site Auditor V3
        if: ${{ github.event.inputs.run_mode != 'FULL' }}
        run: |
          chmod +x agents/site_auditor_v3/tests/run_and_validate.sh
          REQUEST_PATH=/tmp/v3.request.json ./agents/site_auditor_v3/tests/run_and_validate.sh

      - name: Run FULL Site Auditor V3 loop
        if: ${{ github.event.inputs.run_mode == 'FULL' }}
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          FULL_ENTRY_ACTION: ${{ steps.resolve_full.outputs.entry_action }}
          FULL_SESSION_ID: ${{ steps.resolve_full.outputs.session_id }}
        run: |
          chmod +x agents/site_auditor_v3/tests/run_and_validate.sh
          python3 agents/site_auditor_v3/tools/workflow_full_loop.py \
            --target-url "$TARGET_URL" \
            --entry-action "$FULL_ENTRY_ACTION" \
            --session-id "$FULL_SESSION_ID" \
            --state-out-dir "agents/site_auditor_v3/_session_state"

      - name: Locate latest RUN_REPORT
        id: latest_report
        run: |
          REPORT="$(find agents/site_auditor_v3/runs -mindepth 2 -maxdepth 2 -name RUN_REPORT.json -printf '%T@ %p\n' | sort -n | tail -n1 | cut -d' ' -f2-)"
          if [ -z "$REPORT" ] || [ ! -f "$REPORT" ]; then
            echo "RUN_REPORT not found after agent run" >&2
            exit 1
          fi
          echo "path=$REPORT" >> "$GITHUB_OUTPUT"
          echo "LATEST_RUN_REPORT=$REPORT"

      - name: Prepare unified report artifact
        id: session_state
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          python3 agents/site_auditor_v3/tools/workflow_session_state.py publish \
            --target-url "$TARGET_URL" \
            --run-report "${{ steps.latest_report.outputs.path }}" \
            --out-dir "agents/site_auditor_v3/_session_state" \
            --github-output "$GITHUB_OUTPUT"

      - name: Merge run outputs into unified report artifact
        env:
          RUN_REPORT_PATH: ${{ steps.latest_report.outputs.path }}
          ARTIFACT_PATH: ${{ steps.session_state.outputs.artifact_path }}
        run: |
          RUN_DIR="$(dirname "$RUN_REPORT_PATH")"
          if [ -z "$ARTIFACT_PATH" ] || [ ! -d "$ARTIFACT_PATH" ]; then
            echo "Unified artifact path missing: $ARTIFACT_PATH" >&2
            exit 1
          fi
          cp -a "$RUN_DIR"/. "$ARTIFACT_PATH"/
          echo "UNIFIED_ARTIFACT_PATH=$ARTIFACT_PATH"
          find "$ARTIFACT_PATH" -maxdepth 3 -type f | sort

      - name: Upload unified V3 report artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.session_state.outputs.artifact_name }}
          path: ${{ steps.session_state.outputs.artifact_path }}
          if-no-files-found: error
