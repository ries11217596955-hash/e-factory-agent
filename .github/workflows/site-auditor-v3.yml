name: Site Auditor V3

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to audit"
        required: true
        default: "https://example.com"
      scan_profile:
        description: "Audit depth profile"
        required: true
        default: "STANDARD"
        type: choice
        options:
          - STANDARD
          - DEEP

jobs:
  run-v3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip powershell python3

      - name: Prepare request
        run: |
          cp agents/site_auditor_v3/tests/fixtures/link.request.json /tmp/v3.request.json
          sed -i "s#__TARGET_URL__#${{ github.event.inputs.target_url }}#g" /tmp/v3.request.json
          sed -i "s#__SCAN_PROFILE__#${{ github.event.inputs.scan_profile }}#g" /tmp/v3.request.json

      - name: Run Site Auditor V3
        run: |
          chmod +x agents/site_auditor_v3/tests/run_and_validate.sh
          REQUEST_PATH=/tmp/v3.request.json ./agents/site_auditor_v3/tests/run_and_validate.sh

      - name: Upload V3 runpack
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-v3-runpack
          path: agents/site_auditor_v3/_deliver/*.zip
          if-no-files-found: error
