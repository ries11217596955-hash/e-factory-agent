name: Site Auditor V3

on:
  workflow_dispatch:

jobs:
  run-v3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip powershell python3

      - name: Run Site Auditor V3
        run: |
          chmod +x agents/site_auditor_v3/tests/run_and_validate.sh
          ./agents/site_auditor_v3/tests/run_and_validate.sh

      - name: Upload V3 runpack
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-v3-runpack
          path: agents/site_auditor_v3/_deliver/*.zip
          if-no-files-found: error
