name: Site Auditor V3

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL or site to audit"
        required: true
        default: "https://example.com"
      run_mode:
        description: "Operator run mode"
        required: true
        default: "START"
        type: choice
        options:
          - START
          - NEXT
          - FULL

jobs:
  run-v3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip powershell python3

      - name: Prepare request
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          RUN_MODE: ${{ github.event.inputs.run_mode }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          src = Path("agents/site_auditor_v3/tests/fixtures/link.request.json")
          dst = Path("/tmp/v3.request.json")

          target_url = (os.environ.get("TARGET_URL") or "").strip()
          run_mode = (os.environ.get("RUN_MODE") or "START").strip().upper()

          if not target_url:
              raise SystemExit("target_url is required")
          if run_mode not in {"START", "NEXT", "FULL"}:
              raise SystemExit(f"Invalid RUN_MODE: {run_mode!r}; expected START, NEXT, or FULL")

          # This branch is now exposing the final operator menu shape first.
          # START remains executable. NEXT/FULL are intentionally blocked until
          # workflow-level session restore / loop orchestration is implemented.
          if run_mode in {"NEXT", "FULL"}:
              raise SystemExit(
                  f"RUN_MODE={run_mode} is not executable yet on this branch: "
                  "operator-session restore / FULL orchestration is the next implementation step."
              )

          data = json.loads(src.read_text())
          data["target_url"] = target_url
          data["scan_profile"] = "STANDARD"
          data["audit_action"] = "START"
          data["session_id"] = None
          data["batch_size"] = 250
          data["auto_audit"] = False
          data["run_mode"] = run_mode

          dst.write_text(json.dumps(data, indent=2) + "\n")
          print(dst.read_text())
          PY

      - name: Run Site Auditor V3
        run: |
          chmod +x agents/site_auditor_v3/tests/run_and_validate.sh
          REQUEST_PATH=/tmp/v3.request.json ./agents/site_auditor_v3/tests/run_and_validate.sh

      - name: Upload V3 runpack
        uses: actions/upload-artifact@v6
        with:
          name: site-auditor-v3-runpack
          path: agents/site_auditor_v3/_deliver/*
          if-no-files-found: error
