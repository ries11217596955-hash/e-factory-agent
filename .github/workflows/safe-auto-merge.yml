name: Safe Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  safe-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check changed files count
        id: files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const changedFiles = files.data.map(f => f.filename);
            core.setOutput("count", changedFiles.length);
            core.setOutput("files", JSON.stringify(changedFiles));

      - name: Validate safe conditions
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const files = JSON.parse('${{ steps.files.outputs.files }}');

            let safe = true;

            // Rule 1: max 2 files
            if (files.length > 2) safe = false;

            // Rule 2: forbidden paths
            const forbidden = [
              ".github/workflows/",
              "config",
              "package.json",
              "package-lock.json"
            ];

            for (const f of files) {
              for (const bad of forbidden) {
                if (f.includes(bad)) {
                  safe = false;
                }
              }
            }

            const requiresSiteAuditorPsValidation = files.some((f) =>
              f.startsWith('agents/gh_batch/site_auditor_cloud/') && f.endsWith('.ps1')
            );

            core.setOutput("safe", safe);
            core.setOutput("requires_site_auditor_ps_validation", requiresSiteAuditorPsValidation);

      - name: Check TASK_REPORT exists
        id: report
        uses: actions/github-script@v7
        with:
          script: |
            const files = JSON.parse('${{ steps.files.outputs.files }}');
            const hasReport = files.includes("docs/TASK_REPORT.md");
            core.setOutput("hasReport", hasReport);

      - name: Require SITE_AUDITOR PowerShell preflight check
        id: ps_preflight
        if: steps.validate.outputs.requires_site_auditor_ps_validation == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha;
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100
            });

            const preflight = checks.data.check_runs.find((run) => run.name === 'validate-powershell');
            if (!preflight) {
              core.setFailed('SITE_AUDITOR PowerShell preflight check (validate-powershell) not found.');
              return;
            }

            core.info(`Found check run ${preflight.name} with status=${preflight.status} conclusion=${preflight.conclusion}`);

            if (preflight.status !== 'completed') {
              core.setFailed('SITE_AUDITOR PowerShell preflight check has not completed yet.');
              return;
            }

            if (preflight.conclusion !== 'success') {
              core.setFailed(`SITE_AUDITOR PowerShell preflight check failed with conclusion=${preflight.conclusion}.`);
              return;
            }

            core.setOutput('ok', 'true');

      - name: Auto merge PR
        if: >-
          steps.validate.outputs.safe == 'true' &&
          steps.report.outputs.hasReport == 'true' &&
          (steps.validate.outputs.requires_site_auditor_ps_validation != 'true' || steps.ps_preflight.outputs.ok == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: "squash"
            });

            console.log("PR auto-merged (safe)");
