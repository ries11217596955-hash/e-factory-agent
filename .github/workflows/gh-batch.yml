name: GH_BATCH Real

on:
  push:
    branches:
      - main
    paths:
      - 'inbox/*.zip'
  workflow_dispatch:
    inputs:
      run_label:
        description: "Run label for trace (example: run-2026-04-01-01)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: gh-batch-main
  cancel-in-progress: false

jobs:
  run-gh-batch:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git identity
        shell: pwsh
        run: |
          git config user.name "gh-batch-bot"
          git config user.email "gh-batch@bot.local"

      - name: Resolve run label
        id: meta
        shell: pwsh
        run: |
          $manualLabel = "${{ github.event.inputs.run_label }}"
          if ([string]::IsNullOrWhiteSpace($manualLabel)) {
            $label = "auto-$($env:GITHUB_RUN_NUMBER)"
          } else {
            $label = $manualLabel
          }
          "RUN_LABEL=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Run label: $label"

      - name: Preflight secret
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_BATCH_PAT)) {
            throw "Missing repository secret: GH_BATCH_PAT"
          }

      - name: Preflight paths
        shell: pwsh
        run: |
          $root   = $env:GITHUB_WORKSPACE
          $inbox  = Join-Path $root 'inbox'
          $done   = Join-Path $root 'done'
          $logs   = Join-Path $root 'logs'
          $script = Join-Path $root 'agents\gh_batch\RUN_BATCH.ps1'

          if (-not (Test-Path -LiteralPath $inbox)) {
            throw "Inbox folder not found: $inbox"
          }
          if (-not (Test-Path -LiteralPath $script)) {
            throw "RUN_BATCH.ps1 not found: $script"
          }

          New-Item -ItemType Directory -Path $done -Force | Out-Null
          New-Item -ItemType Directory -Path $logs -Force | Out-Null

      - name: Count inbox ZIPs before run
        id: count_before
        shell: pwsh
        run: |
          $inbox = Join-Path $env:GITHUB_WORKSPACE 'inbox'
          $zips = @(Get-ChildItem -LiteralPath $inbox -File -Filter '*.zip' | Sort-Object LastWriteTime)
          $count = $zips.Count
          "ZIP_COUNT=$count" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "ZIP count before run: $count"
          if ($count -eq 0) {
            Write-Host "No ZIP files in inbox. Exiting cleanly."
          }

      - name: Run GH_BATCH for all ZIPs
        if: steps.count_before.outputs.ZIP_COUNT != '0'
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          $root   = $env:GITHUB_WORKSPACE
          $script = Join-Path $root 'agents\gh_batch\RUN_BATCH.ps1'
          $inbox  = Join-Path $root 'inbox'
          $done   = Join-Path $root 'done'
          $logs   = Join-Path $root 'logs'

          $iteration = 0
          $maxIterations = 50

          while ($true) {
            $zips = @(Get-ChildItem -LiteralPath $inbox -File -Filter '*.zip' | Sort-Object LastWriteTime)
            if ($zips.Count -eq 0) {
              Write-Host "Inbox is empty. Batch loop finished."
              break
            }

            $iteration++
            if ($iteration -gt $maxIterations) {
              throw "Safety stop: exceeded maxIterations=$maxIterations"
            }

            Write-Host "Iteration $iteration. Next ZIP: $($zips[0].Name)"

            & $script `
              -InboxDir $inbox `
              -DoneDir $done `
              -LogsDir $logs `
              -RepoOwner 'ries11217596955-hash' `
              -RepoName 'automation-kb' `
              -Branch 'main' `
              -RememberToken:$false

            $remaining = @(Get-ChildItem -LiteralPath $inbox -File -Filter '*.zip').Count
            Write-Host "Remaining ZIP count: $remaining"
          }

      - name: Count inbox ZIPs after run
        id: count_after
        shell: pwsh
        run: |
          $inbox = Join-Path $env:GITHUB_WORKSPACE 'inbox'
          $zips = @(Get-ChildItem -LiteralPath $inbox -File -Filter '*.zip')
          $count = $zips.Count
          "ZIP_COUNT_AFTER=$count" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "ZIP count after run: $count"

      - name: Commit queue state back to repo-agent
        shell: pwsh
        run: |
          $label = "${{ steps.meta.outputs.RUN_LABEL }}"

          git add inbox done logs agents/gh_batch/.state

          $hasChanges = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($hasChanges)) {
            Write-Host "No queue-state changes to commit."
            exit 0
          }

          git commit -m "GH_BATCH_RUN:$label"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gh-batch-${{ steps.meta.outputs.RUN_LABEL }}
          path: |
            done/**
            logs/**
            agents/gh_batch/.state/**
          if-no-files-found: warn
