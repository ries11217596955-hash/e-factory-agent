name: GH_BATCH Real

on:
  push:
    branches:
      - main
    paths:
      - 'inbox/new/*.zip'
  workflow_dispatch:
    inputs:
      run_label:
        description: "Optional run label for trace"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: gh-batch-main
  cancel-in-progress: false

jobs:
  run-gh-batch:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard self-trigger
        shell: pwsh
        run: |
          if ($env:GITHUB_ACTOR -eq "github-actions[bot]") {
            Write-Host "Skip self-trigger"
            exit 0
          }

      - name: Setup Git identity
        shell: pwsh
        run: |
          git config user.name "gh-batch-bot"
          git config user.email "gh-batch@bot.local"

      - name: Resolve run label
        id: meta
        shell: pwsh
        run: |
          $manualLabel = "${{ github.event.inputs.run_label }}"
          if ([string]::IsNullOrWhiteSpace($manualLabel)) {
            $label = "auto-$($env:GITHUB_RUN_NUMBER)"
          } else {
            $label = $manualLabel
          }

          "RUN_LABEL=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Run label: $label"

      - name: Preflight secret
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_BATCH_PAT)) {
            throw "Missing repository secret: GH_BATCH_PAT"
          }

      - name: Preflight paths
        shell: pwsh
        run: |
          $root      = $env:GITHUB_WORKSPACE
          $inboxRoot = Join-Path $root 'inbox'
          $inboxNew  = Join-Path $root 'inbox\new'
          $done      = Join-Path $root 'done'
          $failed    = Join-Path $root 'failed'
          $logs      = Join-Path $root 'logs'
          $script    = Join-Path $root 'agents\gh_batch\RUN_BATCH.ps1'

          if (-not (Test-Path -LiteralPath $inboxRoot)) {
            New-Item -ItemType Directory -Path $inboxRoot -Force | Out-Null
          }
          if (-not (Test-Path -LiteralPath $inboxNew)) {
            New-Item -ItemType Directory -Path $inboxNew -Force | Out-Null
          }
          if (-not (Test-Path -LiteralPath $script)) {
            throw "RUN_BATCH.ps1 not found: $script"
          }

          New-Item -ItemType Directory -Path $done -Force | Out-Null
          New-Item -ItemType Directory -Path $failed -Force | Out-Null
          New-Item -ItemType Directory -Path $logs -Force | Out-Null

      - name: Guard empty inbox
        id: inbox_guard
        shell: pwsh
        run: |
          $inboxNew = Join-Path $env:GITHUB_WORKSPACE 'inbox\new'
          $zips = @()
          if (Test-Path -LiteralPath $inboxNew) {
            $zips = @(Get-ChildItem -LiteralPath $inboxNew -File -Filter '*.zip' | Sort-Object LastWriteTime)
          }

          $count = $zips.Count
          "ZIP_COUNT=$count" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "ZIP count in inbox/new: $count"

          if ($count -eq 0) {
            Write-Host "No ZIP files in inbox/new. Clean exit."
            exit 0
          }

      - name: Run GH_BATCH queue
        if: steps.inbox_guard.outputs.ZIP_COUNT != '0'
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'

          $root      = $env:GITHUB_WORKSPACE
          $script    = Join-Path $root 'agents\gh_batch\RUN_BATCH.ps1'
          $inboxNew  = Join-Path $root 'inbox\new'
          $done      = Join-Path $root 'done'
          $failed    = Join-Path $root 'failed'
          $logs      = Join-Path $root 'logs'
          $runLabel  = "${{ steps.meta.outputs.RUN_LABEL }}"

          $iteration = 0
          $maxIterations = 100

          while ($true) {
            $zips = @(Get-ChildItem -LiteralPath $inboxNew -File -Filter '*.zip' | Sort-Object LastWriteTime)

            if ($zips.Count -eq 0) {
              Write-Host "Inbox/new is empty. Queue finished."
              break
            }

            $iteration++
            if ($iteration -gt $maxIterations) {
              throw "Safety stop: exceeded maxIterations=$maxIterations"
            }

            $currentZip = $zips[0]
            Write-Host "Iteration $iteration. Next ZIP: $($currentZip.Name)"

            try {
              & $script `
                -InboxDir $inboxNew `
                -DoneDir $done `
                -LogsDir $logs `
                -RepoOwner 'ries11217596955-hash' `
                -RepoName 'automation-kb' `
                -Branch 'main' `
                -RememberToken:$false

              Write-Host "Processed successfully: $($currentZip.Name)"
            }
            catch {
              $errText = $_ | Out-String
              Write-Warning "Batch failed: $($currentZip.Name)"
              Write-Warning $errText

              $failedZipPath = Join-Path $failed $currentZip.Name
              if (Test-Path -LiteralPath $failedZipPath) {
                $stamp = Get-Date -Format 'yyyyMMdd_HHmmss'
                $failedZipPath = Join-Path $failed ("{0}_{1}.zip" -f [System.IO.Path]::GetFileNameWithoutExtension($currentZip.Name), $stamp)
              }

              Move-Item -LiteralPath $currentZip.FullName -Destination $failedZipPath -Force

              $failNoteName = [System.IO.Path]::GetFileNameWithoutExtension($currentZip.Name) + ".fail.txt"
              $failNotePath = Join-Path $failed $failNoteName

              $failBody = @(
                "RUN_LABEL=$runLabel"
                "ZIP_NAME=$($currentZip.Name)"
                "FAILED_AT=$(Get-Date -Format s)"
                "SOURCE=inbox/new/$($currentZip.Name)"
                "MOVED_TO=$failedZipPath"
                "REASON_START"
                $errText.Trim()
                "REASON_END"
              ) -join "`r`n"

              Set-Content -LiteralPath $failNotePath -Value $failBody -Encoding UTF8

              $remaining = @(Get-ChildItem -LiteralPath $inboxNew -File -Filter '*.zip').Count
              Write-Host "Moved failed ZIP to failed/: $($currentZip.Name)"
              Write-Host "Remaining ZIP count after fail move: $remaining"
            }
          }

      - name: Commit queue state back to repo-agent
        shell: pwsh
        run: |
          $label = "${{ steps.meta.outputs.RUN_LABEL }}"

          git add inbox done failed logs agents/gh_batch/.state

          $hasChanges = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($hasChanges)) {
            Write-Host "No queue-state changes to commit."
            exit 0
          }

          git commit -m "GH_BATCH_RUN:$label"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gh-batch-${{ steps.meta.outputs.RUN_LABEL }}
          path: |
            done/**
            failed/**
            logs/**
            agents/gh_batch/.state/**
          if-no-files-found: warn
