name: GH_BATCH Real

on:
  push:
    branches:
      - main
    paths:
      - 'inbox/new/*.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-gh-batch:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Guard self-trigger
        shell: pwsh
        run: |
          if ($env:GITHUB_ACTOR -eq "github-actions[bot]") {
            Write-Host "Skip self-trigger"
            exit 0
          }

      - name: Setup dirs
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path "$root/inbox/new" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root/inbox/processing" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root/done" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root/failed" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root/logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$root/agents/gh_batch/.state" | Out-Null

      - name: Drain queue
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $root      = $env:GITHUB_WORKSPACE
          $newDir    = "$root/inbox/new"
          $procDir   = "$root/inbox/processing"
          $doneDir   = "$root/done"
          $failedDir = "$root/failed"
          $logsDir   = "$root/logs"
          $stateDir  = "$root/agents/gh_batch/.state"
          $script    = "$root/agents/gh_batch/RUN_BATCH.ps1"

          $iteration = 0
          $maxIterations = 100

          function Move-WithUniqueName {
            param(
              [Parameter(Mandatory)][string]$SourcePath,
              [Parameter(Mandatory)][string]$TargetDir
            )

            $name = [System.IO.Path]::GetFileName($SourcePath)
            $targetPath = Join-Path $TargetDir $name

            if (Test-Path -LiteralPath $targetPath) {
              $stamp = Get-Date -Format 'yyyyMMdd_HHmmss'
              $base = [System.IO.Path]::GetFileNameWithoutExtension($name)
              $ext  = [System.IO.Path]::GetExtension($name)
              $targetPath = Join-Path $TargetDir ("{0}_{1}{2}" -f $base, $stamp, $ext)
            }

            Move-Item -LiteralPath $SourcePath -Destination $targetPath -Force
            return $targetPath
          }

          while ($true) {
            $queue = @()
            if (Test-Path -LiteralPath $newDir) {
              $queue = @(Get-ChildItem -LiteralPath $newDir -File -Filter '*.zip' | Sort-Object LastWriteTime)
            }

            if ($queue.Count -eq 0) {
              Write-Host "Queue drained. inbox/new is empty."
              break
            }

            $iteration++
            if ($iteration -gt $maxIterations) {
              throw "Safety stop: exceeded maxIterations=$maxIterations"
            }

            $zip = $queue[0]
            $claimedPath = Join-Path $procDir $zip.Name

            if (Test-Path -LiteralPath $claimedPath) {
              $stamp = Get-Date -Format 'yyyyMMdd_HHmmss'
              $claimedPath = Join-Path $procDir ("{0}_{1}.zip" -f [System.IO.Path]::GetFileNameWithoutExtension($zip.Name), $stamp)
            }

            Move-Item -LiteralPath $zip.FullName -Destination $claimedPath -Force
            Write-Host "Claimed ZIP: $claimedPath"

            $jobState = [ordered]@{
              iteration    = $iteration
              zip_name     = [System.IO.Path]::GetFileName($claimedPath)
              claimed_path = $claimedPath
              claimed_at   = (Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
              status       = 'PROCESSING'
            } | ConvertTo-Json -Depth 10

            Set-Content -LiteralPath "$stateDir/current_job.json" -Value $jobState -Encoding UTF8

            $beforeReports = @()
            if (Test-Path -LiteralPath $logsDir) {
              $beforeReports = @(Get-ChildItem -LiteralPath $logsDir -File -Filter 'RUN_REPORT_*.json' | Select-Object -ExpandProperty FullName)
            }

            try {
              & $script `
                -ZipPath $claimedPath `
                -LogsDir $logsDir

              $newReport = $null
              $afterReports = @(Get-ChildItem -LiteralPath $logsDir -File -Filter 'RUN_REPORT_*.json' | Sort-Object LastWriteTime)
              foreach ($report in $afterReports) {
                if ($beforeReports -notcontains $report.FullName) {
                  $newReport = $report.FullName
                }
              }

              if ($null -eq $newReport) {
                throw "FAIL_RUNTIME: RUN_REPORT not produced for $claimedPath"
              }

              $reportObj = Get-Content -LiteralPath $newReport -Raw -Encoding UTF8 | ConvertFrom-Json
              $status = [string]$reportObj.status

              if ($status -eq 'PASS') {
                $donePath = Move-WithUniqueName -SourcePath $claimedPath -TargetDir $doneDir
                Write-Host "Moved to done: $donePath"
              }
              elseif ($status -eq 'PASS_NO_JOB') {
                Write-Host "PASS_NO_JOB returned unexpectedly for claimed ZIP. Treating as runtime fail."
                $failedPath = Move-WithUniqueName -SourcePath $claimedPath -TargetDir $failedDir
                $failNotePath = Join-Path $failedDir ("{0}.fail.txt" -f [System.IO.Path]::GetFileNameWithoutExtension([System.IO.Path]::GetFileName($failedPath)))
                Set-Content -LiteralPath $failNotePath -Value "FAIL_RUNTIME: PASS_NO_JOB returned for claimed ZIP" -Encoding UTF8
              }
              else {
                $failedPath = Move-WithUniqueName -SourcePath $claimedPath -TargetDir $failedDir
                $failNotePath = Join-Path $failedDir ("{0}.fail.txt" -f [System.IO.Path]::GetFileNameWithoutExtension([System.IO.Path]::GetFileName($failedPath)))
                $failBody = @(
                  "ZIP_NAME=$([System.IO.Path]::GetFileName($failedPath))"
                  "FAILED_AT=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
                  "SOURCE=$claimedPath"
                  "FAILED_PATH=$failedPath"
                  "STATUS=$status"
                  "REASON_START"
                  ([string]$reportObj.fail_reason)
                  "REASON_END"
                ) -join "`r`n"
                Set-Content -LiteralPath $failNotePath -Value $failBody -Encoding UTF8
                Write-Host "Moved to failed: $failedPath"
              }

              $jobDone = [ordered]@{
                iteration    = $iteration
                zip_name     = [System.IO.Path]::GetFileName($claimedPath)
                claimed_path = $claimedPath
                finished_at  = (Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
                status       = $status
              } | ConvertTo-Json -Depth 10

              Set-Content -LiteralPath "$stateDir/current_job.json" -Value $jobDone -Encoding UTF8
            }
            catch {
              $errText = $_ | Out-String
              Write-Warning $errText

              if (Test-Path -LiteralPath $claimedPath) {
                $failedPath = Move-WithUniqueName -SourcePath $claimedPath -TargetDir $failedDir
                $failNotePath = Join-Path $failedDir ("{0}.fail.txt" -f [System.IO.Path]::GetFileNameWithoutExtension([System.IO.Path]::GetFileName($failedPath)))
                $failBody = @(
                  "ZIP_NAME=$([System.IO.Path]::GetFileName($failedPath))"
                  "FAILED_AT=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
                  "SOURCE=$claimedPath"
                  "FAILED_PATH=$failedPath"
                  "STATUS=FAIL_RUNTIME"
                  "REASON_START"
                  $errText.Trim()
                  "REASON_END"
                ) -join "`r`n"
                Set-Content -LiteralPath $failNotePath -Value $failBody -Encoding UTF8
              }

              $jobFailed = [ordered]@{
                iteration    = $iteration
                zip_name     = [System.IO.Path]::GetFileName($claimedPath)
                claimed_path = $claimedPath
                finished_at  = (Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
                status       = 'FAIL_RUNTIME'
              } | ConvertTo-Json -Depth 10

              Set-Content -LiteralPath "$stateDir/current_job.json" -Value $jobFailed -Encoding UTF8
            }
          }

      - name: Commit state
        shell: pwsh
        run: |
          git config user.name "gh-batch-bot"
          git config user.email "gh-batch@bot.local"

          git add inbox done failed logs agents/gh_batch/.state

          if (git status --porcelain) {
            git commit -m "queue update"
            git push
          }
