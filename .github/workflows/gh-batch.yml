name: GH_BATCH Real

on:
  push:
    paths:
      paths:
  - 'inbox/*.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-gh-batch:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Guard self-trigger
        shell: pwsh
        run: |
          if ($env:GITHUB_ACTOR -eq "github-actions[bot]") {
            Write-Host "Skip self-trigger"
            exit 0
          }

      - name: Setup Git identity
        shell: pwsh
        run: |
          git config user.name "gh-batch-bot"
          git config user.email "gh-batch@bot.local"

      - name: Preflight inbox
        shell: pwsh
        run: |
          $inbox = Join-Path $env:GITHUB_WORKSPACE "inbox"
          if (!(Test-Path $inbox)) {
            Write-Host "No inbox folder"
            exit 0
          }

      - name: Run GH_BATCH
        shell: pwsh
        run: |
          Write-Host "Running GH_BATCH..."

          $script = Join-Path $env:GITHUB_WORKSPACE "agents\gh_batch\RUN_BATCH.ps1"

          if (!(Test-Path $script)) {
            Write-Error "RUN_BATCH.ps1 not found"
            exit 1
          }

          & $script

      - name: Commit changes
        shell: pwsh
        run: |
          git add .
          git commit -m "GH_BATCH_RUN auto" || echo "no changes"
          git push
