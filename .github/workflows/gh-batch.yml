name: GH_BATCH Pilot

on:
  workflow_dispatch:
    inputs:
      batch_name:
        description: "Unique batch name (e.g. batch-2026-04-01-01)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  run-gh-batch:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Git identity
        shell: pwsh
        run: |
          git config user.name "gh-batch-bot"
          git config user.email "gh-batch@bot.local"

      - name: Check duplicate batch
        id: dupcheck
        shell: pwsh
        run: |
          $batch = "${{ github.event.inputs.batch_name }}"
          $found = git log --grep="GH_BATCH:$batch" -n 1

          if ($found) {
            "DUPLICATE=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Batch already processed: $batch"
          } else {
            "DUPLICATE=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Run GH_BATCH script
        if: steps.dupcheck.outputs.DUPLICATE == 'false'
        shell: pwsh
        run: |
          $batch = "${{ github.event.inputs.batch_name }}"
          Write-Host "Running GH_BATCH for $batch"

          # mock
          New-Item -ItemType File -Path "batch_result_$batch.txt" -Force | Out-Null

      - name: Commit results
        if: steps.dupcheck.outputs.DUPLICATE == 'false'
        shell: pwsh
        run: |
          $batch = "${{ github.event.inputs.batch_name }}"

          git add .
          git commit -m "GH_BATCH:$batch"
          git push origin HEAD:${{ github.ref_name }}

      - name: Mark duplicate
        if: steps.dupcheck.outputs.DUPLICATE == 'true'
        shell: pwsh
        run: |
          "SKIP_DUPLICATE" | Out-File -FilePath "gh_batch_status.txt" -Encoding utf8

      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-batch-log
          path: |
            *.txt
