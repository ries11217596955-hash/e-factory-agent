name: Site Auditor v2 (LINK)

on:
  workflow_dispatch:
    inputs:
      BaseUrl:
        description: "Target site URL"
        required: true

jobs:
  site-auditor-v2-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run site_auditor_v2 in LINK mode
        shell: pwsh
        run: |
          ./agents/site_auditor_v2/agent.ps1 `
            -MODE LINK `
            -BaseUrl "${{ github.event.inputs.BaseUrl }}"

      - name: Print run output paths
        if: always()
        shell: bash
        run: |
          RUN_REPORT="agents/site_auditor_v2/RUN_REPORT.json"
          FAILURE_SUMMARY="agents/site_auditor_v2/failure_summary.json"

          echo "RUN_REPORT.json path: ${RUN_REPORT}"
          if [ -f "${FAILURE_SUMMARY}" ]; then
            echo "failure_summary.json path: ${FAILURE_SUMMARY}"
          else
            echo "failure_summary.json not found"
          fi

      - name: Assert RUN_REPORT artifacts exist before upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RUN_REPORT="agents/site_auditor_v2/RUN_REPORT.json"

          if [ ! -f "${RUN_REPORT}" ]; then
            echo "RUN_REPORT.json missing at ${RUN_REPORT}"
            exit 1
          fi

          mapfile -t ARTIFACTS < <(jq -r '.produced_artifacts[]' "${RUN_REPORT}")
          if [ "${#ARTIFACTS[@]}" -eq 0 ]; then
            echo "RUN_REPORT.produced_artifacts is empty"
            exit 1
          fi

          rm -rf site_auditor_v2_artifact_bundle
          mkdir -p site_auditor_v2_artifact_bundle
          for artifact in "${ARTIFACTS[@]}"; do
            target_path="agents/site_auditor_v2/${artifact}"
            if [ ! -f "${target_path}" ]; then
              echo "Missing produced artifact listed in RUN_REPORT: ${target_path}"
              exit 1
            fi
            cp "${target_path}" "site_auditor_v2_artifact_bundle/${artifact}"
          done

          echo "Artifacts staged for upload:"
          ls -1 site_auditor_v2_artifact_bundle

      - name: Regression check (contract + artifact consistency)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RUN_REPORT="agents/site_auditor_v2/RUN_REPORT.json"
          ACTION_REPORT="agents/site_auditor_v2/ACTION_REPORT.txt"

          test -f "${RUN_REPORT}" || { echo "Missing RUN_REPORT.json"; exit 1; }
          test -f "${ACTION_REPORT}" || { echo "Missing ACTION_REPORT.txt"; exit 1; }

          mapfile -t ARTIFACTS < <(jq -r '.produced_artifacts[]' "${RUN_REPORT}")
          printf '%s\n' "${ARTIFACTS[@]}" | grep -qx 'RUN_REPORT.json' || { echo "RUN_REPORT.json not declared in produced_artifacts"; exit 1; }
          printf '%s\n' "${ARTIFACTS[@]}" | grep -qx 'ACTION_REPORT.txt' || { echo "ACTION_REPORT.txt not declared in produced_artifacts"; exit 1; }

          for artifact in "${ARTIFACTS[@]}"; do
            test -f "agents/site_auditor_v2/${artifact}" || { echo "Listed artifact missing: ${artifact}"; exit 1; }
          done

          STATUS="$(jq -r '.status' "${RUN_REPORT}")"
          PASS_LABEL="$(jq -r '.execution_report.status_detail' "${RUN_REPORT}")"

          if [ "${STATUS}" = "PASS" ]; then
            if [ "${PASS_LABEL}" != "PASS" ] && [ "${PASS_LABEL}" != "PASS_WITH_LIMITS" ]; then
              echo "PASS run must explicitly declare PASS or PASS_WITH_LIMITS in execution_report.status_detail"
              exit 1
            fi
          fi

          if [ "${STATUS}" = "FAIL" ]; then
            test -f "agents/site_auditor_v2/failure_summary.json" || { echo "FAIL run missing failure_summary.json"; exit 1; }
            printf '%s\n' "${ARTIFACTS[@]}" | grep -qx 'failure_summary.json' || { echo "FAIL run must include failure_summary.json in produced_artifacts"; exit 1; }
            jq -e '.failure_or_limit_report.failure_summary == "failure_summary.json"' "${RUN_REPORT}" >/dev/null || { echo "FAIL run must reference failure_summary.json"; exit 1; }
          fi

      - name: Upload run outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-v2-link-output
          path: site_auditor_v2_artifact_bundle
          if-no-files-found: error
