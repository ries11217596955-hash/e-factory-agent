name: Site Auditor v2 (LINK)

on:
  workflow_dispatch:
    inputs:
      BaseUrl:
        description: "Target site URL"
        required: true

jobs:
  site-auditor-v2-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install browser runtime (Playwright Chromium)
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Run site_auditor_v2 in LINK mode
        shell: pwsh
        run: |
          ./agents/site_auditor_v2/agent.ps1 `
            -MODE LINK `
            -BaseUrl "${{ github.event.inputs.BaseUrl }}"

      - name: Print run output paths
        if: always()
        shell: bash
        run: |
          RUN_REPORT="agents/site_auditor_v2/RUN_REPORT.json"
          FAILURE_SUMMARY="agents/site_auditor_v2/failure_summary.json"

          echo "RUN_REPORT.json path: ${RUN_REPORT}"
          if [ -f "${FAILURE_SUMMARY}" ]; then
            echo "failure_summary.json path: ${FAILURE_SUMMARY}"
          else
            echo "failure_summary.json not found"
          fi

      - name: Assert RUN_REPORT artifacts exist before upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RUN_REPORT="agents/site_auditor_v2/RUN_REPORT.json"

          if [ ! -f "${RUN_REPORT}" ]; then
            echo "RUN_REPORT.json missing at ${RUN_REPORT}"
            exit 1
          fi

          LATEST_OUTPUT="$(find agents/site_auditor_v2/output -maxdepth 1 -type d -name 'link_*' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [ -z "${LATEST_OUTPUT}" ] || [ ! -d "${LATEST_OUTPUT}" ]; then
            echo "Latest output folder missing"
            exit 1
          fi

          echo "LATEST_OUTPUT=${LATEST_OUTPUT}"

          rm -rf site_auditor_v2_artifact_bundle
          mkdir -p site_auditor_v2_artifact_bundle
          python - <<'PY2'
from pathlib import Path
import shutil, json

src = Path(__import__("os").environ["LATEST_OUTPUT"])
dst = Path("site_auditor_v2_artifact_bundle")

allowed_files = {
    "RUN_REPORT.json",
    "SELF_DIAGNOSTIC.json",
    "AGENT_MAP.json",
    "AGENT_MAP.md",
    "ACTION_SUMMARY.json",
    "AUDIT_SUMMARY.json",
    "LINK_SUMMARY.json",
    "ROUTES_SUMMARY.json",
    "visual_manifest.json",
    "visual_capture_input.json",
    "HUMAN_REPORT_EN.html",
    "HUMAN_REPORT_RU.html",
}

for name in allowed_files:
    f = src / name
    if f.exists():
        shutil.copy2(f, dst / name)

shots = src / "screenshots"
if shots.exists() and shots.is_dir():
    shutil.copytree(shots, dst / "screenshots", dirs_exist_ok=True)

files = sorted([p.name for p in dst.iterdir()])
bad = sorted(set(files) - allowed_files - {"screenshots"})
if bad:
    raise SystemExit("FORBIDDEN_IN_BUNDLE=" + ",".join(bad))

print("PACKAGING_ALLOWLIST_OK")
PY2

          echo "Artifacts staged for upload:"
          ls -1 site_auditor_v2_artifact_bundle

      - name: Regression check (contract + artifact consistency)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          LATEST_OUTPUT="$(find agents/site_auditor_v2/output -maxdepth 1 -type d -name 'link_*' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [ -z "${LATEST_OUTPUT}" ] || [ ! -d "${LATEST_OUTPUT}" ]; then
            echo "Latest output folder missing"
            exit 1
          fi

          echo "VALIDATING OUTPUT FOLDER: ${LATEST_OUTPUT}"

          RUN_REPORT="${LATEST_OUTPUT}/RUN_REPORT.json"

          test -f "${RUN_REPORT}" || { echo "Missing RUN_REPORT.json"; exit 1; }
          test -f "${LATEST_OUTPUT}/SELF_DIAGNOSTIC.json" || { echo "Missing SELF_DIAGNOSTIC.json"; exit 1; }
          test -f "${LATEST_OUTPUT}/AGENT_MAP.json" || { echo "Missing AGENT_MAP.json"; exit 1; }
          test -f "${LATEST_OUTPUT}/ACTION_SUMMARY.json" || { echo "Missing ACTION_SUMMARY.json"; exit 1; }
          test -f "${LATEST_OUTPUT}/visual_manifest.json" || { echo "Missing visual_manifest.json"; exit 1; }

          STATUS="$(jq -r '.status' "${RUN_REPORT}")"
          PASS_LABEL="$(jq -r '.execution_report.status_detail' "${RUN_REPORT}")"

          if [ "${STATUS}" = "PASS" ]; then
            if [ "${PASS_LABEL}" != "PASS" ] && [ "${PASS_LABEL}" != "PASS_WITH_LIMITS" ]; then
              echo "PASS run must explicitly declare PASS or PASS_WITH_LIMITS in execution_report.status_detail"
              exit 1
            fi
          fi

          if [ "${STATUS}" = "FAIL" ]; then
            if [ -f "${LATEST_OUTPUT}/failure_summary.json" ]; then
              jq -e '.failure_or_limit_report.failure_summary == "failure_summary.json"' "${RUN_REPORT}" >/dev/null || { echo "FAIL run with failure_summary must reference failure_summary.json"; exit 1; }
            else
              echo "FAIL run without failure_summary allowed when OUTPUT completed and run report is present."
            fi
          fi

          echo "REGRESSION_CHECK_OK"
      - name: Upload run outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-v2-link-output
          path: site_auditor_v2_artifact_bundle
          if-no-files-found: error
