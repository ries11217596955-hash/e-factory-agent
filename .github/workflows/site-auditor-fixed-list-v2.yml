name: SITE_AUDITOR Fixed List

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run auditor
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BATCH_PAT }}
        run: |
          pwsh ./agents/gh_batch/site_auditor_cloud/run.ps1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: reports/
          if-no-files-found: error
