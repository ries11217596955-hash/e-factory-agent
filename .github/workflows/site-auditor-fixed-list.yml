name: site-auditor-fixed-list

on:
  workflow_dispatch:
    inputs:
      audit_mode:
        description: 'Audit mode'
        required: true
        default: 'REPO'
        type: choice
        options:
          - REPO
          - ZIP
          - URL
      base_url:
        description: 'Used only for URL mode'
        required: false
        default: 'https://automation-kb.pages.dev'
        type: string
  push:
    paths:
      - 'agents/gh_batch/site_auditor_cloud/input/inbox/**'

permissions:
  contents: read

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo for REPO mode
        if: github.event_name == 'workflow_dispatch' && inputs.audit_mode == 'REPO'
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Setup Node for URL mode
        if: github.event_name == 'workflow_dispatch' && inputs.audit_mode == 'URL'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install URL capture dependencies
        if: github.event_name == 'workflow_dispatch' && inputs.audit_mode == 'URL'
        working-directory: agents/gh_batch/site_auditor_cloud
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run SITE_AUDITOR
        env:
          FORCE_MODE: ${{ github.event_name == 'push' && 'ZIP' || inputs.audit_mode }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://automation-kb.pages.dev' }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          ls -R agents/gh_batch/site_auditor_cloud || true
          ls -R target_repo || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
