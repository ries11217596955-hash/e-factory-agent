name: site-auditor-fixed-list

on:
  workflow_dispatch:

  push:
    paths:
      - '**.zip'

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout auditor repo
        uses: actions/checkout@v4

      - name: Checkout target site repo
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          path: agents/site_auditor_cloud/target_repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        working-directory: agents/site_auditor_cloud
        run: npm install

      - name: Run SITE_AUDITOR
        working-directory: agents/site_auditor_cloud
        run: |
          pwsh -File run.ps1

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: agents/site_auditor_cloud/outbox/**
