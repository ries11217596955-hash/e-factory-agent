name: site-auditor

on:
  workflow_dispatch:

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout auditor repo
        uses: actions/checkout@v4

      - name: Checkout target repo (manual)
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          path: agents/gh_batch/site_auditor/target_repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        working-directory: agents/gh_batch/site_auditor
        run: npm install

      - name: Run SITE_AUDITOR (REPO)
        working-directory: agents/gh_batch/site_auditor
        shell: pwsh
        run: ./run.ps1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: agents/gh_batch/site_auditor/outbox/**
          if-no-files-found: warn
