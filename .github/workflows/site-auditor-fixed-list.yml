name: site-auditor-fixed-list

on:
  workflow_dispatch:
    inputs:
      execution_path:
        description: 'Execution path (BUNDLE for TRI-AUDIT, SINGLE_MODE for explicit operator legacy run)'
        required: true
        default: 'BUNDLE'
        type: choice
        options:
          - BUNDLE
          - SINGLE_MODE
      audit_mode:
        description: 'Manual single-mode audit mode (used only when execution_path=SINGLE_MODE)'
        required: true
        default: 'REPO'
        type: choice
        options:
          - REPO
          - URL
          - ZIP
      base_url:
        description: 'Base URL for audit target (required by SITE_AUDITOR in REPO/ZIP/URL modes)'
        required: false
        default: 'https://automation-kb.pages.dev'
        type: string
  push:
    branches:
      - main
    paths:
      - 'agents/gh_batch/site_auditor_cloud/**'
      - '.github/workflows/site-auditor-fixed-list.yml'

jobs:
  site-audit:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BASE_URL: https://automation-kb.pages.dev

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo for REPO-bound executions (bundle + manual REPO single-mode)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.execution_path == 'BUNDLE' || (inputs.execution_path == 'SINGLE_MODE' && inputs.audit_mode == 'REPO')))
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Setup Node for bundle or live single-mode audits
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.execution_path == 'BUNDLE' || (inputs.execution_path == 'SINGLE_MODE' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))))
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node deps for bundle or live single-mode audits
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.execution_path == 'BUNDLE' || (inputs.execution_path == 'SINGLE_MODE' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npm install

      - name: Cache Playwright browsers for bundle or live single-mode audits
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.execution_path == 'BUNDLE' || (inputs.execution_path == 'SINGLE_MODE' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))))
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install Playwright browsers for bundle or live single-mode audits (if needed)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.execution_path == 'BUNDLE' || (inputs.execution_path == 'SINGLE_MODE' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          if [ -d "$HOME/.cache/ms-playwright" ] && [ "$(find "$HOME/.cache/ms-playwright" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
            echo "PLAYWRIGHT_INSTALL_SKIPPED"
          else
            npx playwright install chromium
            echo "PLAYWRIGHT_INSTALL_DONE"
          fi

      - name: Run SITE_AUDITOR TRI-AUDIT bundle (CI/post-merge + manual bundle)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.execution_path == 'BUNDLE')
        env:
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && (inputs.base_url != '' && inputs.base_url || env.DEFAULT_BASE_URL) || env.DEFAULT_BASE_URL }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          echo "SITE_AUDITOR execution path: TRI-AUDIT bundle"
          pwsh ./run_bundle.ps1

      - name: Run SITE_AUDITOR single-mode (manual operator explicit only)
        if: github.event_name == 'workflow_dispatch' && inputs.execution_path == 'SINGLE_MODE'
        env:
          FORCE_MODE: ${{ inputs.audit_mode }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || env.DEFAULT_BASE_URL }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          echo "SITE_AUDITOR execution path: manual single-mode"
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          pwd
          ls -R agents/gh_batch/site_auditor_cloud || true
          ls -R target_repo || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-bundle-output
          path: |
            agents/gh_batch/site_auditor_cloud/reports/RUN_REPORT.json
            agents/gh_batch/site_auditor_cloud/reports/audit_result.json
            agents/gh_batch/site_auditor_cloud/reports/REPORT.txt
            agents/gh_batch/site_auditor_cloud/reports/00_PRIORITY_ACTIONS.txt
            agents/gh_batch/site_auditor_cloud/reports/01_TOP_ISSUES.txt
            agents/gh_batch/site_auditor_cloud/reports/11A_EXECUTIVE_SUMMARY.txt
            agents/gh_batch/site_auditor_cloud/reports/12A_META_AUDIT_BRIEF.txt
            agents/gh_batch/site_auditor_cloud/reports/ARTIFACT_MANIFEST.json
            agents/gh_batch/site_auditor_cloud/reports/FAILURE_SUMMARY.json
            agents/gh_batch/site_auditor_cloud/reports/RUN_DIAGNOSTIC.json
            agents/gh_batch/site_auditor_cloud/reports/EXECUTION_LOG.txt
            agents/gh_batch/site_auditor_cloud/reports/visual_manifest.json
            agents/gh_batch/site_auditor_cloud/reports/route_normalization_trace.json
            agents/gh_batch/site_auditor_cloud/reports/screenshots/**
          if-no-files-found: error

      - name: Validate agent result
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          canonical_run_report="agents/gh_batch/site_auditor_cloud/reports/RUN_REPORT.json"
          canonical_reports_dir="agents/gh_batch/site_auditor_cloud/reports"
          echo "INFO: Validate agent result using canonical RUN_REPORT path: $canonical_run_report"

          if [ ! -f "$canonical_run_report" ]; then
            echo "ERROR: Missing canonical RUN_REPORT.json at $canonical_run_report"
            echo "DEBUG: Directory listing for $canonical_reports_dir"
            if [ -d "$canonical_reports_dir" ]; then
              ls -la "$canonical_reports_dir" || true
            else
              echo "DEBUG: Directory does not exist: $canonical_reports_dir"
            fi
            exit 1
          fi

          execution_fail=0
          echo "INFO: Found canonical report artifact: $canonical_run_report"
          if grep -q '"status"[[:space:]]*:[[:space:]]*"RUNTIME_FAIL"' "$canonical_run_report"; then
            echo "ERROR: Runtime failure in $canonical_run_report (status=RUNTIME_FAIL)"
            execution_fail=1
          fi
          if grep -q '"execution"[[:space:]]*:[[:space:]]*"CRASH"' "$canonical_run_report"; then
            echo "ERROR: Runtime crash in $canonical_run_report (execution=CRASH)"
            execution_fail=1
          fi

          if [ "$execution_fail" -gt 0 ]; then
            exit 1
          fi

          echo "PASS: Agent executed successfully (audit results may contain FAIL findings)"
