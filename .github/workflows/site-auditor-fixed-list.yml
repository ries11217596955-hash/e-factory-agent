name: SITE_AUDITOR Fixed List

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare reports dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null

      - name: PAT preflight
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_BATCH_PAT)) {
            throw "GH_BATCH_PAT is empty or not available in Actions secrets."
          }
          @{ token_present = $true; token_length = $env:GH_BATCH_PAT.Length } |
            ConvertTo-Json -Depth 5 |
            Out-File -Encoding utf8 reports/pat-preflight.json

      - name: Test API access directly
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BATCH_PAT }}
        run: |
          $targets = @(
            "https://api.github.com/repos/ries11217596955-hash/e-factory-agent",
            "https://api.github.com/repos/ries11217596955-hash/e-factory-memory",
            "https://api.github.com/repos/ries11217596955-hash/automation-kb"
          )

          foreach ($url in $targets) {
            $name = ($url.Split('/')[-2] + "_" + $url.Split('/')[-1] + ".json")
            try {
              $headers = @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                "User-Agent"  = "pat-test"
                Accept        = "application/vnd.github+json"
              }
              $resp = Invoke-WebRequest -Uri $url -Headers $headers -Method Get -ErrorAction Stop
              [pscustomobject]@{
                url = $url
                status_code = [int]$resp.StatusCode
                body = ($resp.Content | ConvertFrom-Json)
              } | ConvertTo-Json -Depth 20 | Out-File -Encoding utf8 ("reports/" + $name)
            }
            catch {
              $status = $null
              $body = $null
              if ($_.Exception.Response) {
                try { $status = [int]$_.Exception.Response.StatusCode.value__ } catch {}
                try {
                  $sr = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $body = $sr.ReadToEnd()
                  $sr.Close()
                } catch {}
              }
              [pscustomobject]@{
                url = $url
                status_code = $status
                error = $_.Exception.Message
                body = $body
              } | ConvertTo-Json -Depth 20 | Out-File -Encoding utf8 ("reports/" + $name)
            }
          }

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: reports/
          if-no-files-found: warn
