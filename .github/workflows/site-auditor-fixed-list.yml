name: site-auditor-fixed-list

on:
  workflow_dispatch:

  push:
    paths:
      - 'agents/site_auditor_cloud/input/**'
      - '.github/workflows/site-auditor-fixed-list.yml'

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout auditor repo
        uses: actions/checkout@v4

      - name: Detect ZIP in inbox
        id: zipcheck
        shell: bash
        run: |
          if find agents/site_auditor_cloud/input -maxdepth 1 -type f -name '*.zip' | grep -q .; then
            echo "zip_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "zip_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target site repo
        if: steps.zipcheck.outputs.zip_found == 'false'
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          path: agents/gh_batch/site_auditor_cloud/target_repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        working-directory: agents/gh_batch/site_auditor_cloud
        run: npm install

      - name: Run SITE_AUDITOR
        working-directory: agents/gh_batch/site_auditor_cloud
        shell: pwsh
        run: ./run.ps1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: agents/gh_batch/site_auditor_cloud/outbox/**
          if-no-files-found: warn
