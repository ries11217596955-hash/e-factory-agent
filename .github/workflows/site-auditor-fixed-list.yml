name: site-auditor-fixed-list

on:
  workflow_dispatch:
  push:
    paths:
      - 'agents/gh_batch/site_auditor_cloud/input/inbox/**'

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo for manual audit
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node deps
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npm install
          npx playwright install --with-deps chromium

      - name: Run SITE_AUDITOR
        env:
          FORCE_MODE: ${{ github.event_name == 'workflow_dispatch' && 'REPO' || 'ZIP' }}
          BASE_URL: https://automation-kb.pages.dev
          TARGET_REPO: ${{ github.workspace }}/target_repo
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          ls -R agents/gh_batch/site_auditor_cloud || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
