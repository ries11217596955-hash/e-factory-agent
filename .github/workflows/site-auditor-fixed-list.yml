name: SITE_AUDITOR Fixed List

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run auditor
  run: |
    pwsh ./agents/site_auditor_cloud/run.ps1

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: reports/
