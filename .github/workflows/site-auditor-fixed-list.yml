name: SITE_AUDITOR Fixed List

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: PAT preflight
        shell: pwsh
        env:
          GH_BATCH_PAT: ${{ secrets.GH_BATCH_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_BATCH_PAT)) {
            throw "GH_BATCH_PAT is empty or not available in Actions secrets."
          }
          Write-Host "PAT is present."

      - name: Test PAT access
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BATCH_PAT }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "User-Agent"  = "pat-test"
            Accept        = "application/vnd.github+json"
          }

          Invoke-RestMethod -Uri "https://api.github.com/repos/ries11217596955-hash/e-factory-agent" -Headers $headers -Method Get | Out-Null
          Write-Host "PAT access to e-factory-agent: OK"

      - name: Run auditor
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BATCH_PAT }}
        run: |
          pwsh ./agents/gh_batch/site_auditor_cloud/run.ps1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: reports/
          if-no-files-found: warn
