name: site-auditor-fixed-list

on:
  workflow_dispatch:
    inputs:
      audit_mode:
        description: 'Manual audit mode (single mode run)'
        required: true
        default: 'REPO'
        type: choice
        options:
          - REPO
          - URL
      base_url:
        description: 'Base URL for audit target (required by SITE_AUDITOR in REPO/ZIP/URL modes)'
        required: false
        default: 'https://automation-kb.pages.dev'
        type: string
  push:
    branches:
      - main
    paths:
      - 'agents/gh_batch/site_auditor_cloud/**'
      - '.github/workflows/site-auditor-fixed-list.yml'

jobs:
  site-audit:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BASE_URL: https://automation-kb.pages.dev

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo for REPO-capable runs
        id: checkout_target_repo
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.audit_mode == 'REPO')
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Record target repo checkout diagnostics
        if: always()
        shell: bash
        run: |
          if [ -d "${GITHUB_WORKSPACE}/target_repo/.git" ]; then
            echo "TARGET_REPO_READY=true" >> "$GITHUB_ENV"
            echo "TARGET_REPO_DIAG=Target repo checkout succeeded." >> "$GITHUB_ENV"
          else
            echo "TARGET_REPO_READY=false" >> "$GITHUB_ENV"
            echo "TARGET_REPO_DIAG=Target repo checkout unavailable; REPO mode will report failure explicitly." >> "$GITHUB_ENV"
          fi

      - name: Setup Node for live audit modes
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node deps for live audit modes
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npm install

      - name: Install Playwright browsers for live audit modes
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npx playwright install --with-deps chromium

      - name: Run SITE_AUDITOR bundle (push to main)
        if: github.event_name == 'push'
        env:
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ env.DEFAULT_BASE_URL }}
          TARGET_REPO_DIAG: ${{ env.TARGET_REPO_DIAG }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run_bundle.ps1

      - name: Run SITE_AUDITOR single mode (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          FORCE_MODE: ${{ inputs.audit_mode }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || env.DEFAULT_BASE_URL }}
          TARGET_REPO_DIAG: ${{ env.TARGET_REPO_DIAG }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          ls -R agents/gh_batch/site_auditor_cloud || true
          ls -R target_repo || true

      - name: Upload primary audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-bundle
          path: agents/gh_batch/site_auditor_cloud/audit_bundle/**
          if-no-files-found: warn

      - name: Upload single-mode outputs (workflow_dispatch)
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: site-auditor-single-mode
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
