name: site-auditor

on:
  workflow_dispatch:
    inputs:
      audit_mode:
        description: 'What to audit'
        required: true
        default: 'repo'
        type: choice
        options:
          - repo
          - url
      target_url:
        description: 'Used only when audit_mode=url'
        required: false
        default: 'https://automation-kb.pages.dev'
        type: string

permissions:
  contents: read

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo
        if: ${{ inputs.audit_mode == 'repo' }}
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Setup Node
        if: ${{ inputs.audit_mode == 'url' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install URL capture deps
        if: ${{ inputs.audit_mode == 'url' }}
        working-directory: agents/gh_batch/site_auditor_cloud
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run SITE_AUDITOR
        env:
          FORCE_MODE: ${{ inputs.audit_mode }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          BASE_URL: ${{ inputs.target_url }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          ls -R agents/gh_batch/site_auditor_cloud || true
          ls -R target_repo || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output-${{ inputs.audit_mode }}
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
