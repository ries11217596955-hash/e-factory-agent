name: site-auditor-fixed-list

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  site-audit:
    runs-on: ubuntu-latest

    env:
      GH_PAT: ${{ secrets.GH_BATCH_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion.ToString()

      # ✅ ВОТ ЗДЕСЬ должен быть install
      - name: Install Node deps
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npm install
          npx playwright install chromium

      - name: Run SITE_AUDITOR
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./agents/gh_batch/site_auditor_cloud/run.ps1 -ReportDir reports

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: reports
          if-no-files-found: warn
