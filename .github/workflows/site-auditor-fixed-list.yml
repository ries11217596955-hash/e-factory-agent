name: site-auditor-repo-baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  site-audit-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Run SITE_AUDITOR in REPO baseline mode
        env:
          FORCE_MODE: REPO
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          ls -R agents/gh_batch/site_auditor_cloud || true
          ls -R target_repo || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output-repo-baseline
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
