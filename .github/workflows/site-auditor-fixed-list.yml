name: site-auditor-fixed-list

on:
  workflow_dispatch:

  push:
    paths:
      - 'agents/gh_batch/site_auditor_cloud/input/inbox/**'
      - '.github/workflows/site-auditor-fixed-list.yml'

jobs:
  site-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable

      - name: Install Node deps
        working-directory: agents/gh_batch/site_auditor_cloud
        run: npm install

      - name: Run SITE_AUDITOR
        working-directory: agents/gh_batch/site_auditor_cloud
        shell: pwsh
        run: ./run.ps1

      - name: Show reports tree
        if: always()
        shell: bash
        run: |
          echo "== reports =="
          find agents/gh_batch/site_auditor_cloud/reports -maxdepth 3 -type f 2>/dev/null | sort || true
          echo "== outbox =="
          find agents/gh_batch/site_auditor_cloud/outbox -maxdepth 4 -type f 2>/dev/null | sort || true

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: |
            agents/gh_batch/site_auditor_cloud/reports/**
            agents/gh_batch/site_auditor_cloud/outbox/**
          if-no-files-found: warn
