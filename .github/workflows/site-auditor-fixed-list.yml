name: site-auditor-fixed-list

on:
  workflow_dispatch:
    inputs:
      audit_mode:
        description: 'Manual audit mode'
        required: true
        default: 'REPO'
        type: choice
        options:
          - REPO
          - URL
      base_url:
        description: 'Base URL for audit target (required by SITE_AUDITOR in REPO/ZIP/URL modes)'
        required: false
        default: 'https://automation-kb.pages.dev'
        type: string
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Safe Auto Merge
    types:
      - completed

concurrency:
  group: site-auditor-${{ github.event_name }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  site-audit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      DEFAULT_BASE_URL: https://automation-kb.pages.dev

    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v4

      - name: Checkout target repo for manual REPO audit
        if: github.event_name == 'workflow_dispatch' && inputs.audit_mode == 'REPO'
        uses: actions/checkout@v4
        with:
          repository: ries11217596955-hash/automation-kb
          token: ${{ secrets.GH_BATCH_PAT }}
          path: target_repo

      - name: Setup Node for live audit modes
        if: github.event_name == 'push' || github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node deps for live audit modes
        if: github.event_name == 'push' || github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npm install

      - name: Install Playwright browsers for live audit modes
        if: github.event_name == 'push' || github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && (inputs.audit_mode == 'REPO' || inputs.audit_mode == 'URL'))
        run: |
          cd agents/gh_batch/site_auditor_cloud
          npx playwright install --with-deps chromium

      - name: Run SITE_AUDITOR
        env:
          FORCE_MODE: ${{ (github.event_name == 'push' || github.event_name == 'workflow_run') && 'ZIP' || inputs.audit_mode }}
          TARGET_REPO_PATH: ${{ github.workspace }}/target_repo
          # SITE_AUDITOR requires BASE_URL in every mode.
          # - workflow_dispatch URL/REPO: operator-provided base_url (or fallback)
          # - push/workflow_run ZIP: default deployed URL fallback
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && (inputs.base_url != '' && inputs.base_url || env.DEFAULT_BASE_URL) || env.DEFAULT_BASE_URL }}
        run: |
          cd agents/gh_batch/site_auditor_cloud
          pwsh ./run.ps1

      - name: Debug tree
        if: always()
        run: |
          find agents/gh_batch/site_auditor_cloud -maxdepth 4 -print || true
          find target_repo -maxdepth 4 -print || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: |
            agents/gh_batch/site_auditor_cloud/outbox/**
            agents/gh_batch/site_auditor_cloud/reports/**
          if-no-files-found: warn
